name: Build SUST Library APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android-app/**"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Build installable APK
        env:
          SUST_KEYSTORE_BASE64: ${{ secrets.SUST_KEYSTORE_BASE64 }}
          SUST_KEYSTORE_PASSWORD: ${{ secrets.SUST_KEYSTORE_PASSWORD }}
          SUST_KEY_ALIAS: ${{ secrets.SUST_KEY_ALIAS }}
          SUST_KEY_PASSWORD: ${{ secrets.SUST_KEY_PASSWORD }}
          SUST_KEYSTORE_FILE: ${{ github.workspace }}/android-app/sust-library-release.jks
        run: |
          set -euo pipefail

          if [ -n "${SUST_KEYSTORE_BASE64:-}" ] && \
             [ -n "${SUST_KEYSTORE_PASSWORD:-}" ] && \
             [ -n "${SUST_KEY_ALIAS:-}" ] && \
             [ -n "${SUST_KEY_PASSWORD:-}" ]; then

            echo "Building signed release APK"

            printf '%s' "$SUST_KEYSTORE_BASE64" | base64 --decode > "$SUST_KEYSTORE_FILE"

            gradle -p android-app --no-daemon :app:assembleRelease

            APK_SOURCE="android-app/app/build/outputs/apk/release/app-release.apk"
            BUILD_TYPE="release"

          else

            echo "Signing secrets are not configured; building an installable debug APK"

            gradle -p android-app --no-daemon :app:assembleDebug

            APK_SOURCE="android-app/app/build/outputs/apk/debug/app-debug.apk"
            BUILD_TYPE="debug"

          fi

          mkdir -p downloads

          cp "$APK_SOURCE" downloads/SUST-Library.apk

          sha256sum downloads/SUST-Library.apk > downloads/SUST-Library.apk.sha256

          printf '%s\n' "$BUILD_TYPE" > downloads/SUST-Library-build-type.txt

      - name: Upload APK as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: SUST-Library-APK
          path: |
            downloads/SUST-Library.apk
            downloads/SUST-Library.apk.sha256
            downloads/SUST-Library-build-type.txt

      - name: Commit APK to the website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            downloads/SUST-Library.apk \
            downloads/SUST-Library.apk.sha256 \
            downloads/SUST-Library-build-type.txt

          if git diff --cached --quiet; then
            echo "No APK changes to commit"
          else
            git commit -m "Publish SUST Library APK [skip ci]"
            git push
          fi
